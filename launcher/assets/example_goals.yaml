# Preset search goals for the LLM-Sim Launcher
# Each entry has a short label (for the dropdown) and the full goal text

goals:
  - label: "Minimize generation cost"
    goal: "Minimize total generation cost while maintaining all bus voltages within 0.95–1.05 p.u. and keeping all line loadings below 100%."

  - label: "Reduce cost by 10%"
    goal: "Reduce the total generation cost by at least 10% compared to the base case, while maintaining system feasibility (all voltages within limits, no line overloads)."

  - label: "Maximize loadability"
    goal: "Find the maximum uniform load scaling factor the network can serve while keeping all line loadings below 90% and all bus voltages within 0.95–1.05 p.u."

  - label: "Fix voltage violations"
    goal: "Identify any buses with voltage magnitudes outside the 0.95–1.05 p.u. range and adjust generator voltage setpoints and dispatch to bring all voltages within limits, while minimizing the increase in generation cost."

  - label: "Minimize losses"
    goal: "Minimize total active power losses in the network by adjusting generator dispatch and voltage setpoints, while keeping all bus voltages within 0.95–1.05 p.u. and all line loadings below 100%."

  - label: "N-1 security improvement"
    goal: "Improve the network's ability to handle single contingencies by reducing the loading on the most heavily loaded lines to below 75%, adjusting generator dispatch as needed while maintaining voltage limits."

  - label: "Multi-objective: cost vs voltage stability"
    goal: "Minimize generation cost while simultaneously keeping all bus voltages as close to 1.0 p.u. as possible and keeping all line loadings below 85%. Report the tradeoffs between cost reduction and voltage/loading margins."

  - label: "Stress test: find critical N-1 contingency"
    goal: "Systematically test N-1 contingencies (single line outages) to identify the most critical lines whose outage causes the largest cost increase, voltage violations, or system infeasibility. Start with the most heavily loaded lines. Report a ranked list of critical contingencies."

  - label: "SCOPFLOW: Security premium analysis"
    goal: "Run SCOPFLOW with all contingencies and report the base case cost. Compare this to the unconstrained OPFLOW cost to quantify the security premium — the additional cost of ensuring N-1 security."

  - label: "SCOPFLOW: Maximum secure load"
    goal: "Find the maximum uniform load scaling factor before the security-constrained dispatch becomes infeasible. Use binary search with fresh mode. This finds the N-1-secure loadability limit."

  - label: "TCOPFLOW: Maximum temporal loadability"
    goal: "Find the maximum uniform load profile scaling factor the network can serve across the entire time horizon while keeping all bus voltages within 0.95–1.05 p.u. and all line loadings below 100% in every time period. Use scale_load_profile to adjust demand and fresh mode for binary search. The worst-case period determines overall feasibility."

  - label: "TCOPFLOW: Peak period stress analysis"
    goal: "Identify the time period with the highest demand and determine whether the system can handle a further 10% increase in load during that peak period only. Scale the load profile by increasing factors and report at what factor the system becomes infeasible. Pay attention to the per-period voltage and loading trends."

  - label: "TCOPFLOW: Ramp constraint impact"
    goal: "Compare the TCOPFLOW solution with ramp coupling enabled vs disabled to quantify the cost of generator ramp constraints. Run the base case first, then try disabling coupling to see if cost decreases. Report the ramp constraint premium — the additional cost imposed by inter-temporal ramp limits."
